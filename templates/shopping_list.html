{% extends "base.html" %}
{% block content %}

<h2>買い物リスト</h2>

<div class="card-list">
    {% for row in rows %}
    <div class="card">
        <div class="card-title">{{ row.title }}</div>
        <div class="small">{{ row.plan_date }}</div>
        <pre>{{ row.ingredients }}</pre>
    </div>
    {% else %}
    <p>献立がまだ登録されていません。</p>
    {% endfor %}
</div>

{% endblock %}
