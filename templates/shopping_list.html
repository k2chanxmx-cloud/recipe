{% extends "base.html" %}
{% block content %}

<h2>買い物リスト</h2>

<form method="get" class="form-card date-select-card">
    <label>開始日</label>
    <input type="date" name="start_date" value="{{ start_date.isoformat() }}">

    <label>終了日</label>
    <input type="date" name="end_date" value="{{ end_date.isoformat() }}">

    <button type="submit">この期間で買い物リスト作成</button>
</form>

<div class="shopping-card">

    {% if ingredients %}

        {% for ingredient, count in ingredients %}
        <label class="shopping-item">
            <input type="checkbox">

            <div class="shopping-text">
                {{ ingredient }}

                {% if count > 1 %}
                <span class="shopping-count">×{{ count }}</span>
                {% endif %}
            </div>
        </label>
        {% endfor %}

    {% else %}
        <p>この期間の献立がまだありません。</p>
    {% endif %}

</div>

<h3>対象の献立</h3>

<div class="card-list">
    {% for row in rows %}
    <div class="card">
        <div class="small">{{ row.plan_date }}</div>
        <div class="card-title">{{ row.title }}</div>
        <pre>{{ row.ingredients }}</pre>
    </div>
    {% endfor %}
</div>

{% endblock %}
