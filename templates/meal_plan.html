{% extends "base.html" %}
{% block content %}

<h2>今週の献立</h2>

<form method="post" class="form-card">

    {% for day in week %}
    <div class="plan-row">
        <div class="plan-date">
            {{ day.date.month }}/{{ day.date.day }}（{{ day.weekday }}）
        </div>

        <select name="recipe_{{ day.index }}">
            <option value="">未定</option>
            {% for r in recipes %}
                <option value="{{ r.id }}"
                    {% if day.plan and day.plan.recipe_id == r.id %}selected{% endif %}>
                    {{ r.category }}｜{{ r.title }}
                </option>
            {% endfor %}
        </select>

        <input type="text" name="note_{{ day.index }}" placeholder="メモ"
               value="{{ day.plan.note if day.plan else '' }}">
    </div>
    {% endfor %}

    <button type="submit">献立を保存</button>
</form>

{% endblock %}
